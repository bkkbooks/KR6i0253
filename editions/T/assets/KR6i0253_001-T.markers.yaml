  - {type: variant, offset: 8460, length: 102, content: '已習行，當教言：「心却皮肉，具觀頭骨不令外念，外念諸緣攝之令還。」若人＝久【宋】，人＋（久）【宮】久【CB】【宋】，人【大】，人久【宮】久人久人久

      習行，却身中一寸皮肉繫意五處：頂上、額上、眉間、鼻端、心處，如是等處住意在骨不令外念，外念諸緣攝之令還。當復觀心，若心疲極捨諸外想注＝住【宮】注【大】，住【宮】注住念在緣，譬如獼猴被繫在柱終日馳走，鎖＝瑣【宋】【宮】＊鎖【大】＊，瑣【宋】【宮】＊鎖瑣常攝', 宋: 如是等處住意在骨不令外念外念諸緣攝之令還當復觀心若心疲極捨諸外想注念在緣譬如獼猴被繫在柱終日馳走瑣常攝已習行當教言心却皮肉具觀頭骨不令外念外念諸緣攝之令還若久習行却身中一寸皮肉繫意五處頂上頂上眉間鼻端心處}
